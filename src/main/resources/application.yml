      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms


mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.word.wordmemory.entity

